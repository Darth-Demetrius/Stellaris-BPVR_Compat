[paths]
build = "_build"
merged = "_merged"
conflicts = "_conflicts"
tracking = "_tracking"

[templates]
replace = "{source_dir}/{source_name}_replace_{source_mod_id}.txt"
merge = "{source_dir}/����_all_merged_common_items.txt"
snapshot = "{mod_name}_{source_name}.txt"
metadata_line = "# {key}: {value}"

[mods]
vanilla = "/disks/SteamLibrary/SteamLibrary/steamapps/common/Stellaris"
my_mod = "_My Patch"
pd_arcologies = "Imports/Planetary Diversity - More Arcologies"
bpvr_base = "Imports/BPVR - More Building Slots"
bpvr_compat = "Imports/BPVR - Compatibility Patch"
bpvr_compat_improved = "Extra Imports/BPVR - Compatibility Improved"
bpvr_fix = "Extra Imports/BPVR Fixed"
acot = "Extra Imports/Ancient Cache of Technologies"
giga = "Extra Imports/Gigastructural Engineering & More"

[[conflicts.rules]]
any_from = ["vanilla"]
with_any = ["my_mod"]

[[conflicts.rules]]
any_from = ["my_mod", "pd_arcologies", "bpvr_base", "bpvr_compat"]
with_any = ["vanilla", "my_mod", "pd_arcologies", "bpvr_base", "bpvr_compat", "bpvr_compat_improved", "bpvr_fix"]

[[conflicts.rules]]
any_from = ["bpvr_compat"]
with_any = ["acot", "giga"]

[priority]
vanilla = 1
bpvr_compat = 0

[ordering]
sources = ["bpvr_compat", "vanilla"]
